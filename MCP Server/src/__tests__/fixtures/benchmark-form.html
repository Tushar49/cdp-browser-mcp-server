<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Benchmark Form</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; }
    form { display: flex; flex-direction: column; gap: 0.75rem; }
    label { display: flex; flex-direction: column; gap: 0.25rem; font-weight: 500; }
    label.inline { flex-direction: row; align-items: center; gap: 0.5rem; font-weight: normal; }
    input, select, textarea { padding: 0.4rem; font-size: 1rem; border: 1px solid #999; border-radius: 4px; }
    textarea { min-height: 80px; resize: vertical; }
    button { padding: 0.5rem 1.25rem; font-size: 1rem; cursor: pointer; background: #0066cc; color: #fff; border: none; border-radius: 4px; }
    button:hover { background: #004fa3; }
    #result { margin-top: 1rem; padding: 0.75rem; background: #f0f0f0; border-radius: 4px; white-space: pre-wrap; min-height: 2rem; }
  </style>
</head>
<body>
  <h1>CDP Benchmark Test Form</h1>

  <form id="test-form">
    <label>
      Full Name
      <input type="text" id="name" name="name" placeholder="Enter your name" required />
    </label>

    <label>
      Email
      <input type="email" id="email" name="email" placeholder="you@example.com" required />
    </label>

    <label>
      Phone
      <input type="tel" id="phone" name="phone" placeholder="+1-555-0100" />
    </label>

    <label>
      Country
      <select id="country" name="country">
        <option value="">Select…</option>
        <option value="US">United States</option>
        <option value="IN">India</option>
        <option value="UK">United Kingdom</option>
        <option value="DE">Germany</option>
        <option value="JP">Japan</option>
      </select>
    </label>

    <label>
      Experience
      <input type="text" id="experience" name="experience" list="exp-list" placeholder="Select or type…" />
      <datalist id="exp-list">
        <option value="0-1 years"></option>
        <option value="1-3 years"></option>
        <option value="3-5 years"></option>
        <option value="5+ years"></option>
      </datalist>
    </label>

    <label class="inline">
      <input type="checkbox" id="terms" name="terms" value="yes" />
      I agree to the terms and conditions
    </label>

    <fieldset style="border:none;padding:0;margin:0;">
      <legend style="font-weight:500;margin-bottom:0.25rem;">Gender</legend>
      <label class="inline">
        <input type="radio" name="gender" value="M" /> Male
      </label>
      <label class="inline">
        <input type="radio" name="gender" value="F" /> Female
      </label>
      <label class="inline">
        <input type="radio" name="gender" value="O" /> Other
      </label>
    </fieldset>

    <label>
      Start Date
      <input type="date" id="start-date" name="start-date" />
    </label>

    <label>
      Resume
      <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" />
    </label>

    <label>
      Cover Letter
      <textarea id="cover-letter" name="cover-letter" placeholder="Write a short cover letter…"></textarea>
    </label>

    <button type="submit">Submit</button>
  </form>

  <div id="result" aria-live="polite"></div>

  <script>
    document.getElementById('test-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var data = new FormData(e.target);
      var obj = {};
      data.forEach(function (value, key) { obj[key] = value; });
      document.getElementById('result').textContent = JSON.stringify(obj, null, 2);
    });
  </script>
</body>
</html>
